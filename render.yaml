services:
  - type: web
    name: dhyey-portfolio
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: ANALYTICS_PASSWORD
        sync: false

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: dhyey
